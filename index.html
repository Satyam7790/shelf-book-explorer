<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf | Digital Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-row">
            <h1>Shelf</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search title or author...">
                <select id="sort-select">
                    <option value="relevance">Relevance</option>
                    <option value="newest">Newest First</option>
                    <option value="title-asc">Title: A-Z</option>
                </select>
            </div>
        </div>

        <nav class="filter-bar">
            <button class="filter-btn active" data-category="fiction">Fiction</button>
            <button class="filter-btn" data-category="history">History</button>
            <button class="filter-btn" data-category="science">Science</button>
            <button class="filter-btn" data-category="art">Art</button>
            <button class="filter-btn" data-category="tech">Tech</button>
            <button class="filter-btn" data-category="philosophy">Philosophy</button>
        </nav>
    </header>

    <main>
        <div id="loading-state" class="loader">
            <div class="spinner"></div>
            <p>Organizing your shelf...</p>
        </div>
        <div id="book-container" class="book-grid"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
