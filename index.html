<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf | Digital Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand">
            <h1>Shelf</h1>
            <p>A Minimalistic Encyclopedia</p>
        </div>

        <div class="search-area">
            <input type="text" id="search-input" placeholder="Search by author, title, or era...">
            <select id="sort-select">
                <option value="relevance">Relevance</option>
                <option value="newest">Newest</option>
                <option value="title-asc">A-Z</option>
            </select>
        </div>

        <nav class="filter-bar">
            <button class="filter-btn active" data-category="fiction">Fiction</button>
            <button class="filter-btn" data-category="history">History</button>
            <button class="filter-btn" data-category="philosophy">Philosophy</button>
            <button class="filter-btn" data-category="poetry">Poetry</button>
            <button class="filter-btn" data-category="science">Science</button>
        </nav>
    </header>

    <main>
        <div id="loading-state" class="loader">
            <div class="spinner"></div>
        </div>

        <div id="book-container" class="book-grid"></div>

        <div class="pagination">
            <button id="load-more-btn">Explore More</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Shelf. Built JavaScript.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
